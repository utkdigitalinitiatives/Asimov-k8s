---
# Grafana admin credentials sourced from Azure Key Vault (kv-asimov-secrets) via the
# External Secrets Operator. Mirrors apps/base/redis-mainsite/external-secret.yaml.
# The username is fixed to "admin"; only the password comes from Key Vault. The resulting
# grafana-admin secret is consumed by the kube-prometheus-stack HelmRelease
# (grafana.admin.existingSecret).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        admin-user: "admin"
        admin-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: grafana-admin-password
