---
# Grafana Entra ID (Azure AD) OAuth client secret, sourced from Azure Key Vault
# (kv-asimov-secrets) via the External Secrets Operator. Mirrors
# grafana-admin-externalsecret.yaml.
#
# The resulting `grafana-oauth` Kubernetes Secret is injected into the Grafana pod as the
# GF_AUTH_AZUREAD_CLIENT_SECRET env var (see grafana.envValueFrom in
# kube-prometheus-stack.yaml) and referenced from grafana.ini via $__env{...}.
#
# Populate the Key Vault secret before this syncs:
#   az keyvault secret set --vault-name kv-asimov-secrets \
#     --name grafana-azuread-client-secret --value '<client-secret-from-entra>'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: grafana-oauth
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: grafana-azuread-client-secret
