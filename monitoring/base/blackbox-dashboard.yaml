---
# Grafana dashboard for the blackbox-exporter endpoint probes (see blackbox-probes.yaml),
# auto-loaded by the kube-prometheus-stack Grafana sidecar (grafana_dashboard label).
# UptimeRobot/Uptime-Kuma-style view: current UP/DOWN, uptime % over the selected range, a
# red/green availability timeline, response-time + HTTP-status-code graphs, and a TLS
# cert-expiry table. Series are keyed by the `site` label added in the Probe.
# Generated by scratchpad gen_blackbox_dashboard.py.
apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-endpoint-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  endpoint-uptime.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "blackbox",
        "uptime",
        "ingress"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "label": "Data source",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            },
            "hide": 0,
            "refresh": 1,
            "regex": "",
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Endpoint Uptime (Blackbox)",
      "uid": "blackbox-endpoint-uptime",
      "version": 1,
      "weekStart": "",
      "panels": [
        {
          "title": "Current status",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "probe_success",
              "legendFormat": "{{ site }}",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value_and_name",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "UP",
                      "color": "green",
                      "index": 0
                    }
                  }
                },
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "color": "red",
                      "index": 1
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 1
        },
        {
          "title": "Uptime % (selected range)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 5,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "avg_over_time(probe_success[$__range]) * 100",
              "legendFormat": "{{ site }}",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "value_and_name",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 3,
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 99
                  },
                  {
                    "color": "green",
                    "value": 99.9
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "id": 2
        },
        {
          "title": "Availability history",
          "type": "state-timeline",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "probe_success",
              "legendFormat": "{{ site }}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "options": {
            "mergeValues": true,
            "showValue": "never",
            "alignValue": "center",
            "rowHeight": 0.9,
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "UP",
                      "color": "green",
                      "index": 0
                    }
                  }
                },
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "color": "red",
                      "index": 1
                    }
                  }
                }
              ],
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "custom": {
                "fillOpacity": 90,
                "lineWidth": 0
              }
            },
            "overrides": []
          },
          "id": 3
        },
        {
          "title": "Response time (total probe duration)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "probe_duration_seconds",
              "legendFormat": "{{ site }}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "id": 4
        },
        {
          "title": "HTTP status code",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "probe_http_status_code",
              "legendFormat": "{{ site }}",
              "range": true,
              "instant": false,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 0,
                "showPoints": "always",
                "pointSize": 5,
                "lineInterpolation": "stepAfter"
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "id": 5
        },
        {
          "title": "TLS certificate expiry (days remaining)",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 21
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "(probe_ssl_earliest_cert_expiry - time()) / 86400",
              "legendFormat": "{{ site }}",
              "range": false,
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns",
                "keepLabels": [
                  "site",
                  "instance"
                ]
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "job": true
                },
                "renameByName": {
                  "Value": "Days until expiry",
                  "site": "Site",
                  "instance": "URL"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Days until expiry"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "d"
                  },
                  {
                    "id": "decimals",
                    "value": 1
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background"
                    }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "red",
                          "value": null
                        },
                        {
                          "color": "yellow",
                          "value": 14
                        },
                        {
                          "color": "green",
                          "value": 30
                        }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true
          },
          "id": 6
        }
      ]
    }
