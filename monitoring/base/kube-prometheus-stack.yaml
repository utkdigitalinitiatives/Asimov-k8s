---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: monitoring
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '>=87.0.0 <88.0.0'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 12h
  # Install CRDs with the chart
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Manage CRDs via the chart's crds subchart. On a fresh install (old unmanaged CRDs
    # deleted during teardown) Helm installs the v0.92.0 CRDs from the subchart's crds/ dir.
    crds:
      enabled: true

    # AKS runs the control plane as a managed service and does not expose the
    # kube-controller-manager, kube-scheduler, or kube-proxy metrics endpoints. Disabling
    # these components drops their unscrapeable ServiceMonitors AND the permanently-firing
    # false-positive KubeControllerManagerDown / KubeSchedulerDown / KubeProxyDown critical
    # alerts (plus the *InstanceUnreachable siblings) — the rule groups are gated on each
    # component's `enabled` flag.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Retention settings
        retention: 30d
        retentionSize: "45GB"

        # Storage configuration for Azure Managed Disks
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: managed-csi
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi

        # Resource limits
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

        # Schedule on user nodes
        nodeSelector:
          kubernetes.azure.com/mode: user

        # Enable ServiceMonitor discovery across all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false

        # Enable administrative APIs
        enableAdminAPI: true

    # Grafana configuration
    grafana:
      enabled: true

      # Admin credentials from Azure Key Vault via External Secrets (grafana-admin secret,
      # synced by grafana-admin-externalsecret.yaml). Username fixed to "admin".
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password

      # Inject the Entra ID (Azure AD) OAuth client secret from the grafana-oauth
      # ExternalSecret (-> Key Vault grafana-azuread-client-secret) as an env var,
      # referenced by grafana.ini's auth.azuread.client_secret via $__env{...}.
      envValueFrom:
        GF_AUTH_AZUREAD_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-oauth
            key: client-secret

      # Persistent storage for dashboards
      persistence:
        enabled: true
        storageClassName: managed-csi
        accessModes: ["ReadWriteOnce"]
        size: 10Gi

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # Schedule on user nodes
      nodeSelector:
        kubernetes.azure.com/mode: user

      # Default dashboards
      defaultDashboardsEnabled: true

      # Public access via Traefik + Let's Encrypt (cert-manager).
      # DNS: grafana.lib.utk.edu -> 68.220.244.21 (Asimov Traefik LB, IngressClass "traefik").
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - grafana.lib.utk.edu
        path: /
        pathType: Prefix
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.lib.utk.edu

      # Grafana configuration
      grafana.ini:
        server:
          domain: grafana.lib.utk.edu
          root_url: "https://grafana.lib.utk.edu"
          serve_from_sub_path: false
        analytics:
          check_for_updates: true
        # SSO users who sign in via Entra get this org role by default. The local
        # `admin` account (Key Vault password, login form still enabled) stays as the
        # break-glass full admin. Bump/lower this, or add App Roles for per-user
        # Admin/Editor/Viewer, later if needed.
        users:
          auto_assign_org_role: Editor
        # Microsoft Entra ID (Azure AD) OAuth.
        # Access is gated in Entra: the enterprise app has "User assignment required =
        # Yes" and only the chosen security group is assigned, so non-members cannot
        # complete sign-in. client_id and tenant are not secrets; the client secret is
        # injected from Key Vault via the GF_AUTH_AZUREAD_CLIENT_SECRET env var.
        # Redirect URI to register in Entra: https://grafana.lib.utk.edu/login/azuread
        "auth.azuread":
          enabled: true
          name: UTK Login
          allow_sign_up: true
          auto_login: false
          client_id: "e131bae2-bd12-4ae1-be71-934e8975a459"
          client_secret: "$__env{GF_AUTH_AZUREAD_CLIENT_SECRET}"
          scopes: "openid email profile"
          auth_url: "https://login.microsoftonline.com/515813d9-717d-45dd-9eca-9aa19c09d6f9/oauth2/v2.0/authorize"
          token_url: "https://login.microsoftonline.com/515813d9-717d-45dd-9eca-9aa19c09d6f9/oauth2/v2.0/token"
          allowed_organizations: "515813d9-717d-45dd-9eca-9aa19c09d6f9"
          role_attribute_strict: false

    # Alertmanager configuration
    alertmanager:
      alertmanagerSpec:
        # Storage for Alertmanager
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: managed-csi
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi

        # Resource limits
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Schedule on user nodes
        nodeSelector:
          kubernetes.azure.com/mode: user

    # Prometheus Operator configuration
    prometheusOperator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

      nodeSelector:
        kubernetes.azure.com/mode: user

    # Node exporter - runs on all nodes as DaemonSet
    nodeExporter:
      enabled: true

    # Kube-state-metrics configuration
    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

      nodeSelector:
        kubernetes.azure.com/mode: user

    # Default service monitors (enabled by default)
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: true
        configReloaders: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: true
        kubelet: true
        kubeProxy: true
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: true
        kubeSchedulerAlerting: true
        kubeSchedulerRecording: true
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true
