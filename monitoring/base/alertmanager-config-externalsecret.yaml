---
# Full Alertmanager configuration, rendered by the External Secrets Operator so the Postmark
# Server API token never lands in Git. Everything here (routing, receivers, addresses) is plain
# and reviewable; ONLY the token is pulled from Azure Key Vault and injected as {{ .token }}.
#
# Why the whole config goes through ESO instead of the chart's `alertmanager.config`:
# Postmark uses the Server API token as BOTH the SMTP username and password, and Alertmanager's
# email_config has `auth_password_file` but NO `auth_username_file` variant. So the token would
# have to appear in plaintext as `auth_username` if the config lived in Git. Rendering the config
# via ESO keeps the token in Key Vault only, consistent with grafana-admin/redis secrets.
#
# The kube-prometheus-stack HelmRelease consumes this via:
#   alertmanager.alertmanagerSpec.useExistingSecret: true   # chart does not create its own config secret
#   alertmanager.alertmanagerSpec.configSecret: alertmanager-config
#
# PREREQUISITE — create the Key Vault secret BEFORE this is applied, or the target secret is never
# rendered and the Alertmanager pod is stuck waiting to mount it:
#   az keyvault secret set --vault-name kv-asimov-secrets \
#     --name alertmanager-postmark-token --value '<postmark-server-api-token>'
#
# Transport: Postmark SMTP (smtp.postmarkapp.com:587, STARTTLS) -> a Microsoft Teams channel email
# address. Get the address in Teams: channel -> ••• -> "Get email address". Ensure the channel's
# email settings allow the Postmark sender domain, and that the `from` address below is a verified
# Sender Signature / domain in Postmark.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
            smtp_smarthost: 'smtp.postmarkapp.com:587'
            smtp_from: 'librarieswebsite@utk.edu'
            smtp_auth_username: '{{ .token }}'
            smtp_auth_password: '{{ .token }}'
            smtp_require_tls: true

          # This channel is a site-health + emergencies feed. Only two things reach Teams:
          #   1. Blackbox external checks (alertname Endpoint*): up/down is the headline, plus
          #      cert-expiry / latency / probe-outage.
          #   2. Any critical-severity alert (currently NodeCPURequestsCritical; future criticals
          #      such as a dead node or a full PV also page here).
          # Everything else — including the known warning-level capacity/overcommit alerts and all
          # info alerts — falls through to `null`: still visible in Grafana ("Alerts Overview"
          # dashboard) and the Alertmanager UI, but not emailed to Teams.
          route:
            receiver: 'null'
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              # External site up/down (+ cert expiry / latency / probe outage). Listed first so
              # a critical EndpointDown routes here (not the generic critical route below); both
              # deliver to the same channel, so there is no double-send either way.
              - matchers:
                  - alertname =~ "Endpoint.*"
                receiver: 'teams'
                group_by: ['alertname', 'instance']
                group_wait: 15s
                repeat_interval: 1h
              # Genuine emergencies: anything critical.
              - matchers:
                  - severity = "critical"
                receiver: 'teams'
                group_wait: 10s
                repeat_interval: 1h

          receivers:
            - name: 'null'
            - name: 'teams'
              email_configs:
                - to: '4af51974.live.utk.edu@amer.teams.ms'
                  send_resolved: true

          # Standard kube-prometheus-stack inhibition: a critical suppresses the matching
          # warning/info for the same alertname+namespace so Teams isn't double-posted.
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity =~ "warning|info"
              equal: ['namespace', 'alertname']
            - source_matchers:
                - severity = "warning"
              target_matchers:
                - severity = "info"
              equal: ['namespace', 'alertname']
  data:
    - secretKey: token
      remoteRef:
        key: alertmanager-postmark-token
