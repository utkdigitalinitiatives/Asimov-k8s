---
# ClusterSecretStore pointing at the lib-main Key Vault. Reuses the existing
# external-secrets ServiceAccount and its workload-identity binding (client
# id 4b3be16b-…). The Azure RBAC grant (Key Vault Secrets User) on this
# vault is created by lib-main-infra Terraform — see
# environments/production/main.tf, azurerm_role_assignment.asimov_eso_kv_secrets_user.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault-lib-main
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://lib-main-kv-4ad11abb.vault.azure.net/"
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
---
# All four Solr user passwords as a single Secret. Consumed by the
# security-init Job to build security.json with hashes that match what
# Drupal/operator/admins will use to authenticate.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: solr-mainsite-user-passwords
  namespace: solr-mainsite
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-lib-main
    kind: ClusterSecretStore
  target:
    name: solr-mainsite-user-passwords
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: production-solr-admin-password
    - secretKey: solr-password
      remoteRef:
        key: production-solr-internal-password
    - secretKey: operator-password
      remoteRef:
        key: production-solr-operator-password
    - secretKey: drupal-mainsite-password
      remoteRef:
        key: production-solr-drupal-mainsite-password
---
# basic-auth Secret for the Solr Operator to authenticate as k8s-oper.
# The username is fixed; the password is templated from the same KV secret
# the security-init Job uses to hash k8s-oper's entry in security.json,
# guaranteeing they match.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: solr-mainsite-operator-auth
  namespace: solr-mainsite
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-lib-main
    kind: ClusterSecretStore
  target:
    name: solr-mainsite-operator-auth
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "k8s-oper"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: production-solr-operator-password
